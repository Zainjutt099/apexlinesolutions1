<!DOCTYPE html>
<html lang="ur">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply - Apexline Solutions</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .container {
            display: flex;
            width: 90%;
            max-width: 1200px;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        /* کارٹون اینیمیشن والا حصہ */
        
        .brand-section {
            flex: 1;
            min-width: 300px;
            animation: bounceInLeft 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }
        
        .brand-name {
            font-size: 4rem;
            color: #ff4757;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 4px 4px 0px #2f3542, 8px 8px 0px #747d8c;
            line-height: 1;
            transform: rotate(-5-deg);
        }
        
        @keyframes bounceInLeft {
            0% {
                opacity: 0;
                transform: translateX(-1000px) rotate(-30deg);
            }
            60% {
                opacity: 1;
                transform: translateX(30px) rotate(10deg);
            }
            80% {
                transform: translateX(-10px) rotate(-5deg);
            }
            100% {
                transform: translateX(0) rotate(-5deg);
            }
        }
        /* فارم والا حصہ */
        
        .form-card {
            flex: 1;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            min-width: 350px;
            margin: 20px;
        }
        
        .form-card h2 {
            color: #2f3542;
            margin-bottom: 20px;
            border-bottom: 3px solid #ff4757;
            display: inline-block;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #57606f;
        }
        
        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #edeff2;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        
        input:focus {
            border-color: #ff4757;
            outline: none;
        }
        
        button {
            background: #ff4757;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.2rem;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: 0.3s;
        }
        
        button:hover {
            background: #e84118;
            transform: scale(1.02);
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="brand-section">
            <h1 class="brand-name">Apexline<br>Solutions</h1>
        </div>

        <div class="form-card">
            <h2>Application Form</h2>
            <form action="submit.php" method="POST">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="full_name" required placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label>School Name</label>
                    <input type="text" name="school_name" required placeholder="Enter your school name">
                </div>
                <div class="form-group">
                    <label>School Category</label>
                    <select name="category">
                    <option value="Pre-Primary">Pre-Primary</option>
                    <option value="Primary">Primary</option>
                    <option value="Intermediate">Intermediate</option>
                </select>
                </div>
                <div class="form-group">
                    <label>Contact Number</label>
                    <input type="tel" name="phone" required placeholder="03xx-xxxxxxx">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required placeholder="example@gmail.com">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" rows="4" placeholder="Briefly describe..."></textarea>
                </div>
                <button type="submit">Submit Application</button>
            </form>
        </div>
    </div>

</body>

</html>
